name: Bug Report
description: Report a bug with the Turing Pi Terraform provider
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      placeholder: "e.g. 0.1.0"
  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      placeholder: "e.g. 1.9.0"
  - type: input
    id: go-version
    attributes:
      label: Go Version (if building from source)
      placeholder: "e.g. 1.22"
  - type: input
    id: firmware-version
    attributes:
      label: Turing Pi Firmware Version
      placeholder: "e.g. 2.0.5"
  - type: textarea
    id: terraform-config
    attributes:
      label: Terraform Configuration
      description: Minimal configuration that reproduces the issue.
      render: hcl
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `terraform apply`
        2. ...
    validations:
      required: true
  - type: textarea
    id: debug-output
    attributes:
      label: Debug Output
      description: Run with TF_LOG=DEBUG and paste relevant output.
      render: shell
